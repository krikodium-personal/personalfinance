    setError(''); setSuccess(''); setLoading(true);
    if (mode === 'login') {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) setError(error.message);
      else onAuth(data.user);
    } else {
      const { error } = await supabase.auth.signUp({ email, password });

const fmt = (n, currency = 'ARS') => {
  const abs = Math.abs(n);
  if (currency === 'USD') return `U$S ${n.toLocaleString('es-AR', {minimumFractionDigits:2,maximumFractionDigits:2})}`;
  if (abs >= 1000000) return `$${(n/1000000).toFixed(1)}M`;
  if (abs >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n.toLocaleString('es-AR')}`;
};

// ── DONUT CHART ───────────────────────────────────────────────────────────────
function DonutChart({ data, size = 160 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return <div style={{width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center',color:'#aaa',fontSize:13}}>Sin datos</div>;
  const r = 56, cx = size/2, cy = size/2, circumference = 2 * Math.PI * r;
  let cumulative = 0;
  const slices = data.map(d => {
    const pct = d.value / total;
    const dash = pct * circumference;
    const offset = cumulative * circumference;
    cumulative += pct;
    return { ...d, dash, offset: circumference - offset };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e8e3dd" strokeWidth="20"/>
      {slices.map((s, i) => (
        <circle key={i} cx={cx} cy={cy} r={r} fill="none"
          stroke={s.color} strokeWidth="20"
          strokeDasharray={`${s.dash} ${circumference - s.dash}`}
          strokeDashoffset={s.offset} strokeLinecap="round"
          style={{transform:'rotate(-90deg)',transformOrigin:`${cx}px ${cy}px`,transition:'all 0.5s'}}/>
      ))}
      <text x={cx} y={cy-6} textAnchor="middle" fontSize="11" fill="#6b6560" fontFamily="DM Sans">Total</text>
      <text x={cx} y={cy+12} textAnchor="middle" fontSize="15" fontWeight="600" fill="#1a1714" fontFamily="DM Sans">{fmt(total)}</text>
    </svg>
  );
}

function HomeTab({ transactions, loading, t, accent, radius, onDelete }) {
  const now = new Date();

  const [filterYear] = useState(now.getFullYear());

  const filtered = transactions.filter(tx => {
    const d = new Date(tx.date);
    return d.getMonth() === filterMonth && d.getFullYear() === filterYear;
  });

  // Only ARS for balance summary (USD kept separate)
  const arsIncome  = filtered.filter(t=>t.type==='income'  && t.currency!=='USD').reduce((s,t)=>s+t.amount,0);
  const arsExpense = filtered.filter(t=>t.type==='expense' && t.currency!=='USD').reduce((s,t)=>s+t.amount,0);
  const usdIncome  = filtered.filter(t=>t.type==='income'  && t.currency==='USD').reduce((s,t)=>s+t.amount,0);
  const usdExpense = filtered.filter(t=>t.type==='expense' && t.currency==='USD').reduce((s,t)=>s+t.amount,0);
  const arsBalance = arsIncome - arsExpense;

  const sorted = [...filtered].sort((a,b) => new Date(b.date)-new Date(a.date));

  return (
    <div style={{padding:'0 16px'}}>
      {/* Month Selector */}
      <div style={{display:'flex',gap:8,overflowX:'auto',padding:'16px 0',scrollbarWidth:'none'}}>
        {MONTHS.map((m,i) => (

            flexShrink:0,padding:'6px 14px',border:'none',cursor:'pointer',fontFamily:'DM Sans',
            fontSize:13,fontWeight:500,borderRadius:20,transition:'all 0.2s',
            background: filterMonth===i ? accent : t.inputBg,

        <div style={{display:'flex',gap:20,marginTop:16}}>
          <div><div style={{fontSize:11,opacity:0.7,marginBottom:3}}>↑ INGRESOS</div><div style={{fontSize:16,fontWeight:600}}>{fmt(arsIncome)}</div></div>

        </div>
      </div>

      {/* USD summary if any */}
      {(usdIncome > 0 || usdExpense > 0) && (
        <div style={{background:t.card,borderRadius:radius,padding:16,marginBottom:12,display:'flex',gap:20}}>
          <div><div style={{fontSize:11,color:t.textSecondary,marginBottom:3}}>↑ USD Ingresos</div><div style={{fontSize:14,fontWeight:600,color:t.text}}>{fmt(usdIncome,'USD')}</div></div>
          <div style={{width:1,background:t.border}}/>
          <div><div style={{fontSize:11,color:t.textSecondary,marginBottom:3}}>↓ USD Gastos</div><div style={{fontSize:14,fontWeight:600,color:t.text}}>{fmt(usdExpense,'USD')}</div></div>
        </div>
      )}

      {/* Transactions */}
      <div style={{fontSize:12,fontWeight:600,color:t.textSecondary,marginBottom:12,marginTop:4}}>MOVIMIENTOS</div>
      {loading && (
        <div style={{display:'flex',justifyContent:'center',padding:'40px 0'}}>
          <Spinner color={accent}/>
        </div>
      )}
      {!loading && sorted.length === 0 && (
        <div style={{textAlign:'center',color:t.textSecondary,padding:'40px 0',fontSize:14}}>
          No hay movimientos este mes
        </div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {sorted.map(tx => {
          const cat = getCat(tx.category);
          const d = new Date(tx.date);
          return (
            <div key={tx.id} style={{background:t.card,borderRadius:radius*0.75,padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:42,height:42,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,background:tx.type==='income'?`${accent}20`:`${cat.color}18`}}>
                {tx.type==='income' ? '💰' : cat.icon}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:t.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{tx.desc}</div>
                <div style={{fontSize:12,color:t.textSecondary,marginTop:2}}>{tx.type==='income'?'Ingreso':cat.label} · {d.getDate()} {MONTHS[d.getMonth()]}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{fontSize:16,fontWeight:600,color:tx.type==='income'?accent:t.text}}>
                  {tx.type==='income'?'+':'-'}{fmt(tx.amount, tx.currency)}
                </div>
                <button onClick={()=>onDelete(tx.id)} style={{background:'none',border:'none',cursor:'pointer',color:t.textSecondary,opacity:0.5,padding:'2px'}}>
                  <Icon name="trash" size={15}/>
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SUMMARY TAB ───────────────────────────────────────────────────────────────
function SummaryTab({ transactions, t, accent, radius }) {
  const now = new Date();
  const monthlyData = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-5+i, 1);
    const txs = transactions.filter(tx => {
      const td = new Date(tx.date);
      return td.getMonth()===d.getMonth() && td.getFullYear()===d.getFullYear() && tx.currency!=='USD';
    });
    return {
      label: MONTHS[d.getMonth()],
      expense: txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),
      income:  txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      current: d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(),
    };
  });

  const curMonth = transactions.filter(tx => {
    const d = new Date(tx.date);
    return tx.type==='expense' && tx.currency!=='USD' && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const byCat = CATEGORIES.map(c => ({
    label:c.label, color:c.color,
    value: curMonth.filter(t=>t.category===c.id).reduce((s,t)=>s+t.amount,0),
  })).filter(d=>d.value>0);

  return (
    <div style={{padding:'16px 16px 0'}}>
      <div style={{fontSize:12,fontWeight:600,color:t.textSecondary,marginBottom:12}}>GASTOS ARS — ÚLTIMOS 6 MESES</div>
      <div style={{background:t.card,borderRadius:radius,padding:20,marginBottom:16}}>
        <BarChart monthlyData={monthlyData} accent={accent}/>
      </div>
      <div style={{fontSize:12,fontWeight:600,color:t.textSecondary,marginBottom:12}}>DISTRIBUCIÓN ESTE MES</div>
      <div style={{background:t.card,borderRadius:radius,padding:20,marginBottom:16,display:'flex',gap:20,alignItems:'center'}}>
        <DonutChart data={byCat} size={160}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
          {byCat.slice(0,5).map((d,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:8,height:8,borderRadius:4,background:d.color,flexShrink:0}}/>
              <span style={{fontSize:12,color:t.textSecondary,flex:1}}>{d.label}</span>
              <span style={{fontSize:12,fontWeight:600,color:t.text}}>{fmt(d.value)}</span>
            </div>
          ))}
          {byCat.length>5 && <span style={{fontSize:11,color:t.textSecondary}}>+{byCat.length-5} más</span>}
          {byCat.length===0 && <span style={{fontSize:12,color:t.textSecondary}}>Sin datos</span>}
        </div>
      </div>
    </div>
  );
}

// ── BUDGET TAB ────────────────────────────────────────────────────────────────
function BudgetTab({ transactions, budgets, onSaveBudget, t, accent, radius }) {
  const now = new Date();
  const [editing, setEditing] = useState(null);
  const [editVal, setEditVal] = useState('');

  const curExpenses = transactions.filter(tx => {
    const d = new Date(tx.date);
    return tx.type==='expense' && tx.currency!=='USD' && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });

  const handleSave = async (catId) => {
    const val = parseFloat(editVal);
    if (!isNaN(val) && val >= 0) await onSaveBudget(catId, val);
    setEditing(null);
  };

  return (
    <div style={{padding:'16px 16px 0'}}>
      <div style={{fontSize:12,fontWeight:600,color:t.textSecondary,marginBottom:4}}>PRESUPUESTO MENSUAL (ARS)</div>
      <div style={{fontSize:12,color:t.textSecondary,marginBottom:16}}>Toca cualquier categoría para editar</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {CATEGORIES.filter(c=>c.id!=='other').map(cat => {
          const spent = curExpenses.filter(tx=>tx.category===cat.id).reduce((s,tx)=>s+tx.amount,0);
          const budget = budgets[cat.id] || 0;
          const pct = budget > 0 ? Math.min(spent/budget,1) : 0;
          const over = spent > budget && budget > 0;
          return (
            <div key={cat.id} style={{background:t.card,borderRadius:radius*0.75,padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:budget>0?10:0}}>
                <span style={{fontSize:20}}>{cat.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:500,color:t.text}}>{cat.label}</div>
                  {editing===cat.id ? (
                    <div style={{display:'flex',gap:6,marginTop:4}}>
                      <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter')handleSave(cat.id);}}
                        style={{flex:1,fontSize:13,padding:'4px 8px',border:`1px solid ${accent}`,borderRadius:6,background:t.inputBg,color:t.text,fontFamily:'DM Sans',outline:'none'}}/>
                      <button onClick={()=>handleSave(cat.id)} style={{padding:'4px 10px',background:accent,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontFamily:'DM Sans'}}>OK</button>
                    </div>
                  ) : (
                    <button onClick={()=>{setEditing(cat.id);setEditVal(String(budget));}} style={{background:'none',border:'none',cursor:'pointer',color:t.textSecondary,fontSize:12,padding:0,fontFamily:'DM Sans',textAlign:'left',marginTop:2}}>
                      {budget>0 ? `Presupuesto: ${fmt(budget)}` : 'Definir presupuesto'}
                    </button>
                  )}
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:14,fontWeight:600,color:over?'#e05555':t.text}}>{fmt(spent)}</div>
                  {budget>0 && <div style={{fontSize:11,color:t.textSecondary}}>de {fmt(budget)}</div>}
                </div>
              </div>
              {budget>0 && (
                <div style={{background:t.inputBg,borderRadius:4,height:5,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:4,background:over?'#e05555':accent,width:`${pct*100}%`,transition:'width 0.5s'}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── TWEAKS ────────────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks, t }) {
  const themeOpts = [{value:'light',label:'Claro'},{value:'dark',label:'Oscuro'},{value:'warm',label:'Cálido'}];
  const accentOpts = ['#1a7a5e','#2563eb','#7c3aed','#d97706','#dc2626','#0891b2'];
  return (
    <div style={{position:'fixed',bottom:90,right:16,background:t.card,borderRadius:16,padding:20,boxShadow:t.shadow,zIndex:50,width:220,border:`1px solid ${t.border}`}}>
      <div style={{fontSize:13,fontWeight:600,color:t.text,marginBottom:16}}>Tweaks</div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:t.textSecondary,marginBottom:8,fontWeight:500}}>TEMA</div>
        <div style={{display:'flex',gap:6}}>
          {themeOpts.map(o => (
            <button key={o.value} onClick={()=>setTweaks(p=>({...p,theme:o.value}))} style={{
              flex:1,padding:'6px 0',border:`1.5px solid ${tweaks.theme===o.value?tweaks.accentColor:t.border}`,
              borderRadius:8,background:'none',cursor:'pointer',fontFamily:'DM Sans',fontSize:11,
              color:tweaks.theme===o.value?tweaks.accentColor:t.textSecondary,fontWeight:tweaks.theme===o.value?600:400,
            }}>{o.label}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:t.textSecondary,marginBottom:8,fontWeight:500}}>COLOR DE ACENTO</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {accentOpts.map(c => (
            <button key={c} onClick={()=>setTweaks(p=>({...p,accentColor:c}))} style={{
              width:28,height:28,borderRadius:'50%',background:c,
              border:`2.5px solid ${tweaks.accentColor===c?t.text:'transparent'}`,cursor:'pointer',
            }}/>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:11,color:t.textSecondary,marginBottom:8,fontWeight:500}}>RADIO: {tweaks.cardRadius}px</div>
        <input type="range" min={8} max={24} value={tweaks.cardRadius} onChange={e=>setTweaks(p=>({...p,cardRadius:+e.target.value}))} style={{width:'100%',accentColor:tweaks.accentColor}}/>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(() => {
    const saved = localStorage.getItem('finanzas_tweaks');
    return saved ? {...TWEAK_DEFAULTS,...JSON.parse(saved)} : TWEAK_DEFAULTS;
  });
  const [showTweaks, setShowTweaks] = useState(false);
  const [tab, setTab] = useState(() => localStorage.getItem('finanzas_tab') || 'home');
  const [transactions, setTransactions] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  const t = themes[tweaks.theme] || themes.warm;
  const accent = tweaks.accentColor;
  const radius = tweaks.cardRadius;

  const showToast = (message, type='info') => {
    setToast({message, type});
    setTimeout(() => setToast(null), 3000);
  };

  // ── Auth state ─────────────────────────────────────────────────────────────
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setAuthLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // ── Load data ──────────────────────────────────────────────────────────────
  const loadTransactions = useCallback(async () => {
    setLoading(true);
    const { data, error } = await supabase
      .from('transactions')
      .select('*')
      .order('date', { ascending: false });
    if (error) { showToast('Error al cargar datos: ' + error.message, 'error'); }
    else { setTransactions(data.map(rowToTx)); }
    setLoading(false);
  }, []);

  const loadBudgets = useCallback(async () => {
    const { data, error } = await supabase.from('budgets').select('*');
    if (!error && data) {
      const obj = {};
      data.forEach(b => { obj[b.category] = b.amount; });
      setBudgets(obj);
    }
  }, []);

  useEffect(() => {
    if (user) {
      loadTransactions();
      loadBudgets();
    }
  }, [user]);

  // ── Tweaks persistence ─────────────────────────────────────────────────────
  useEffect(() => {
    localStorage.setItem('finanzas_tweaks', JSON.stringify(tweaks));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
  }, [tweaks]);

  useEffect(() => { localStorage.setItem('finanzas_tab', tab); }, [tab]);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
  }, []);

  // ── CRUD ───────────────────────────────────────────────────────────────────
  const addTransaction = async (tx) => {
    const { data, error } = await supabase.from('transactions').insert([{
      type: tx.type, category: tx.category, amount: tx.amount,
      currency: tx.currency, description: tx.desc, date: tx.date,
      user_id: user.id,
    }]).select().single();
    if (error) { showToast('Error al guardar: ' + error.message, 'error'); return; }
    setTransactions(prev => [rowToTx(data), ...prev]);
    showToast('Transacción guardada ✓');
  };

  const deleteTransaction = async (id) => {
    const { error } = await supabase.from('transactions').delete().eq('id', id);
    if (error) { showToast('Error al eliminar', 'error'); return; }
    setTransactions(prev => prev.filter(tx => tx.id !== id));
  };

  const saveBudget = async (catId, amount) => {
    const { error } = await supabase.from('budgets').upsert({ category: catId, amount, user_id: user.id, updated_at: new Date().toISOString() });
    if (error) { showToast('Error al guardar presupuesto', 'error'); return; }
    setBudgets(prev => ({...prev, [catId]: amount}));
  };

  const navItems = [
    { id:'home',    label:'Inicio',      icon:'home'   },
    { id:'summary', label:'Resumen',     icon:'chart'  },
    { id:'budget',  label:'Presupuesto', icon:'wallet' },
  ];

  if (authLoading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
      <Spinner color="#1a7a5e"/>
    </div>
  );

  if (!user) return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',justifyContent:'center',background:'#fdf6ee'}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} html,body,#root{height:auto;min-height:100vh;background:#fdf6ee}`}</style>
      <AuthScreen onAuth={setUser}/>
    </div>
  );

  const logout = async () => {
    await supabase.auth.signOut();
    setTransactions([]); setBudgets({});
  };

  return (
    <div style={{width:'100%',minHeight:'100vh',display:'flex',justifyContent:'center',background:t.bg}}>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        html,body,#root{height:auto;min-height:100vh;background:${t.bg};}
        *::-webkit-scrollbar{display:none}
      `}</style>

      {/* App container */}
      <div style={{
        width:'100%', maxWidth:560,
        background: t.bg, display:'flex', flexDirection:'column',
        position:'relative', minHeight:'100vh',
      }}>
        {/* Toast */}
        {toast && <Toast message={toast.message} type={toast.type} t={t}/>}

        {/* Top bar */}
        <div style={{height:56,background:t.bg,display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'0 20px',flexShrink:0}}>
          <button onClick={loadTransactions} style={{background:'none',border:'none',cursor:'pointer',color:t.textSecondary,padding:0,display:'flex',alignItems:'center'}}>
            <Icon name={loading?'refresh':'cloud'} size={18} color={loading?accent:t.textSecondary}/>
          </button>
        </div>

        {/* Header */}
        <div style={{padding:'0 20px 16px',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:22,fontWeight:700,color:t.text}}>Mis Finanzas</div>
              <div style={{fontSize:13,color:t.textSecondary,marginTop:2}}>{user.email}</div>
            </div>
            <button onClick={logout} style={{background:'none',border:`1px solid ${t.border}`,borderRadius:10,padding:'6px 12px',cursor:'pointer',fontSize:12,color:t.textSecondary,fontFamily:'DM Sans'}}>
              Salir
            </button>
          </div>
        </div>

        {/* Content — flows in the page, scrolls naturally */}
        <div style={{flex:1, display:'flex', flexDirection:'column', paddingBottom:120}}>
          {tab==='home'    && <HomeTab transactions={transactions} loading={loading} t={t} accent={accent} radius={radius} onDelete={deleteTransaction}/>}
          {tab==='summary' && <SummaryTab transactions={transactions} t={t} accent={accent} radius={radius}/>}
          {tab==='budget'  && <BudgetTab transactions={transactions} budgets={budgets} onSaveBudget={saveBudget} t={t} accent={accent} radius={radius}/>}
        </div>

        {/* Bottom Nav (fixed to viewport bottom, centered, respects safe-area on iOS) */}
        <div style={{
          position:'fixed', bottom:0, left:0, right:0,
          display:'flex', justifyContent:'center',
          pointerEvents:'none', zIndex:20,
        }}>
          <div style={{
            width:'100%', maxWidth:560,
            background:t.navBg, borderTop:`1px solid ${t.border}`,
            display:'flex', alignItems:'center', justifyContent:'space-around',
            padding:'8px 8px calc(env(safe-area-inset-bottom, 0px) + 8px)',
            boxShadow:'0 -4px 20px rgba(0,0,0,0.06)',
            pointerEvents:'auto',
          }}>
            {navItems.map(n => (
              <button key={n.id} onClick={()=>setTab(n.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:'8px 16px',color:tab===n.id?accent:t.textSecondary,transition:'color 0.2s'}}>
                <Icon name={n.icon} size={22} color={tab===n.id?accent:t.textSecondary}/>
                <span style={{fontSize:10,fontWeight:tab===n.id?600:400,fontFamily:'DM Sans'}}>{n.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* FAB (fixed to viewport, aligned with the 560px container) */}
        <div style={{position:'fixed',bottom:0,left:0,right:0,display:'flex',justifyContent:'center',pointerEvents:'none',zIndex:30}}>
          <div style={{width:'100%',maxWidth:560,position:'relative',pointerEvents:'none'}}>
            <button onClick={()=>setShowAdd(true)} style={{
              position:'absolute',
              bottom:'calc(env(safe-area-inset-bottom, 0px) + 82px)',
              right:20, width:56, height:56,
              background:accent, borderRadius:'50%', border:'none', cursor:'pointer',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:`0 6px 20px ${accent}66`,
              transition:'transform 0.15s', pointerEvents:'auto',
            }}
              onMouseEnter={e=>e.currentTarget.style.transform='scale(1.08)'}
              onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
              <Icon name="plus" size={24} color="#fff"/>
            </button>
          </div>
        </div>
      </div>

      {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} t={t}/>}
      {showAdd && <AddModal onClose={()=>setShowAdd(false)} onAdd={addTransaction} t={t} accent={accent} radius={radius}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
